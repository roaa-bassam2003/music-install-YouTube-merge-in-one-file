<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محوّل يوتيوب MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="grid-bg"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
            <path d="M16 13l11 7-11 7V13z" fill="currentColor"/>
            <circle cx="20" cy="20" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">يوتيوب MP3</span>
          <span class="logo-sub">محوّل وضاغط الصوت</span>
        </div>
      </div>
      <div class="header-badge">
        <span class="pulse-dot"></span>
        <span>يدعم WhatsApp 16MB</span>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Convert Section -->
    <section class="section convert-section">
      <div class="section-label">
        <span class="section-num">01</span>
        <span>تحويل فيديو</span>
      </div>

      <div class="converter-card">
        <div class="input-group">
          <div class="input-wrapper">
            <div class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </div>
            <input
              type="text"
              id="ytUrl"
              class="url-input"
              placeholder="https://www.youtube.com/watch?v=..."
              dir="ltr"
              autocomplete="off"
            >
            <button class="clear-btn" id="clearBtn" aria-label="مسح">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <button class="convert-btn" id="convertBtn">
            <span class="btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 3 21 3 21 8"/>
                <line x1="4" y1="20" x2="21" y2="3"/>
                <polyline points="21 16 21 21 16 21"/>
                <line x1="15" y1="15" x2="21" y2="21"/>
              </svg>
            </span>
            <span class="btn-text">تحويل إلى MP3</span>
          </button>
        </div>

        <!-- Progress -->
        <div class="progress-container" id="progressContainer" hidden>
          <div class="progress-header">
            <span class="progress-status" id="progressStatus">جارٍ المعالجة...</span>
            <span class="progress-percent" id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            <div class="progress-glow" id="progressGlow"></div>
          </div>
        </div>

        <!-- Messages -->
        <div class="message-box" id="messageBox" hidden></div>
      </div>
    </section>

    <!-- Files List Section -->
    <section class="section files-section">
      <div class="section-header">
        <div class="section-label">
          <span class="section-num">02</span>
          <span>مكتبة الملفات</span>
        </div>
        <div class="files-actions">
          <button class="action-btn secondary" id="selectAllBtn" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <polyline points="9 12 12 15 15 9"/>
            </svg>
            <span>تحديد الكل</span>
          </button>
          <button class="action-btn primary" id="mergeBtn" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>دمج المحدد (<span id="selectedCount">0</span>)</span>
          </button>
        </div>
      </div>

      <div class="files-container" id="filesContainer">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg viewBox="0 0 80 80" fill="none">
              <circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4"/>
              <path d="M28 40h24M40 28v24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="empty-title">لا توجد ملفات بعد</p>
          <p class="empty-sub">أضف رابط يوتيوب وابدأ التحويل</p>
        </div>

        <ul class="files-list" id="filesList" hidden></ul>
      </div>
    </section>

    <!-- Merge Progress -->
    <section class="section merge-section" id="mergeSection" hidden>
      <div class="section-label">
        <span class="section-num">03</span>
        <span>الدمج والضغط</span>
      </div>

      <div class="merge-card">
        <div class="progress-container">
          <div class="progress-header">
            <span class="progress-status" id="mergeStatus">جارٍ الدمج...</span>
            <span class="progress-percent" id="mergePercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="mergeBar" style="width: 0%"></div>
            <div class="progress-glow"></div>
          </div>
        </div>

        <div class="merge-message" id="mergeMessage" hidden></div>

        <div class="download-ready" id="downloadReady" hidden>
          <div class="download-icon">
            <svg viewBox="0 0 60 60" fill="none">
              <circle cx="30" cy="30" r="28" stroke="var(--accent)" stroke-width="2"/>
              <path d="M20 30l10 10 10-10" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="30" y1="18" x2="30" y2="40" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="download-info">
            <p class="download-title">الملف جاهز للتحميل</p>
            <p class="download-size" id="downloadSize"></p>
          </div>
          <a class="download-btn" id="downloadLink" href="#" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            تحميل الملف
          </a>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>مدعوم بـ Node.js · FFmpeg · ytdl-core</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
